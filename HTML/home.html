<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waverush | home (login)</title>
  <link rel="stylesheet" href="../CSS/start.css">
</head>
<body>

<!--navigation-->
<nav class="nav-bar">
  <h1 class="logo">🌊 WaveRush</h1>
  <ul class="nav-links">
    <li><a href="home.html" class="active">Home</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="game.html">Play</a></li>
    <li><a href="leaderboard.html">Leaderboard</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li id="logoutLi" style="display:none;"><button id="logoutBtn">Logout</button></li>
  </ul>
</nav>

<!--login section-->
<section class="page-section">
  <form id="loginForm">
    <h2>login</h2>

    <div class="input-row">
      <label for="username">username:</label>
      <input type="text" id="username" placeholder="enter username">
    </div>

    <div class="input-row">
      <label for="email">email:</label>
      <input type="email" id="email" placeholder="enter email">
    </div>

    <div class="input-row">
      <label for="password">password:</label>
      <input type="password" id="password" placeholder="enter password">
    </div>

    <button type="button" id="loginBtn">login</button>
    <button type="button" id="guestBtn">play as guest</button>

    <p id="message"></p>
  </form>
</section>

<!--scripts-->
<script src="../JS/login.js" defer></script>
<script src="../JS/logout.js" defer></script>
<script>
//hide leaderboard link for guest users
document.addEventListener("DOMContentLoaded", () => {
  const currentUser = JSON.parse(sessionStorage.getItem("current_wave_user"));
  if (currentUser && currentUser.guest) {
    const leaderboardLink = document.querySelector('a[href="leaderboard.html"]');
    if (leaderboardLink) leaderboardLink.parentElement.style.display = "none";
  }
});
</script>
</body>
</html>
