    <p><strong>age:</strong> <span id="profileAge"></span></p>

    <p><strong>top score:</strong> <span id="profileTopScore"></span></p>
    <p><strong>games played:</strong> <span id="profileGames"></span></p>
  </div>

  <button id="editProfileBtn">edit profile</button>
  <p id="message"></p>
</section>
